
<!DOCTYPE html>

    <title>CoStudy | Learn Together</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    (function(){var d=localStorage.getItem('costudy-dark-mode');if(d==='true')document.documentElement.classList.add('dark');})();
    // Force unregister stale service workers in dev
    if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(sw){sw.unregister();console.log('Unregistered stale SW');})});}
  </script>
  <body class="selection:bg-brand selection:text-white antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
